<app-navbar></app-navbar>

<div class="planning-container">
  <h2>Planning</h2>
  @if (loading) {
    <div>Chargement...</div>
  }
  @if (error) {
    <div class="error-message">{{ error }}</div>
  }
  @if (!loading && !error) {
    @for (planning of plannings; track planning.id) {
      <div class="planning-card">
        <p>Employé: {{ planning.employeId }}</p>
        <p>Début: {{ planning.dateDebut }}</p>
        <p>Fin: {{ planning.dateFin }}</p>
      </div>
    }
  }
</div>
