<div class="register-container">
  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form">
    <h2>Register</h2>

    <div class="form-group">
      <label for="nom">Nom</label>
      <input type="text" id="nom" formControlName="nom" class="form-control">
      <div *ngIf="nom?.invalid && (nom?.dirty || nom?.touched)" class="error-message">
        <small *ngIf="nom?.errors?.['required']">Le nom est requis.</small>
      </div>
    </div>

    <div class="form-group">
      <label for="prenom">Prénom</label>
      <input type="text" id="prenom" formControlName="prenom" class="form-control">
      <div *ngIf="prenom?.invalid && (prenom?.dirty || prenom?.touched)" class="error-message">
        <small *ngIf="prenom?.errors?.['required']">Le prénom est requis.</small>
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" formControlName="email" class="form-control">
      <div *ngIf="email?.invalid && (email?.dirty || email?.touched)" class="error-message">
        <small *ngIf="email?.errors?.['required']">L'email est requis.</small>
        <small *ngIf="email?.errors?.['email']">Veuillez entrer un email valide.</small>
      </div>
    </div>

    <div class="form-group">
      <label for="motDePasse">Mot de passe</label>
      <input type="password" id="motDePasse" formControlName="motDePasse" class="form-control">
      <div *ngIf="motDePasse?.invalid && (motDePasse?.dirty || motDePasse?.touched)" class="error-message">
        <small *ngIf="motDePasse?.errors?.['required']">Le mot de passe est requis.</small>
      </div>
    </div>

    <div class="form-group">
      <label for="telephone">Téléphone (optionnel)</label>
      <input type="tel" id="telephone" formControlName="telephone" class="form-control">
    </div>

    <div *ngIf="serverError" class="error-message server-error">
      <small>{{ serverError }}</small>
    </div>

    <button type="submit" [disabled]="registerForm.invalid" class="btn-register">Register</button>

    <div class="login-link">
      <p>Already have an account? <a routerLink="/login">Login here</a></p>
    </div>
  </form>
</div>
