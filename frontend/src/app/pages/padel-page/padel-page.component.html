<app-navbar></app-navbar>

<div class="padel-container">
  <h2>Terrains de Padel</h2>
  @if (loading()) {
    <div>Chargement...</div>
  }
  @if (error()) {
    <div class="error-message">{{ error() }}</div>
  }
  @if (!loading() && !error()) {
    @for (terrain of terrains(); track terrain.id) {
      <div class="terrain-card">
        <h3>{{ terrain.nom }}</h3>
        <p>Type: {{ terrain.type }}</p>
        <p>Disponible: {{ terrain.disponible ? 'Oui' : 'Non' }}</p>
      </div>
    }
  }
</div>
